<script type="text/javascript">
var currentWebSocket = null;

var nameForm = document.querySelector("#name-form");
var nameInput = document.querySelector("#name-input");
var roomForm = document.querySelector("#room-form");
var roomNameInput = document.querySelector("#room-name");
var goPublicButton = document.querySelector("#go-public");
var goPrivateButton = document.querySelector("#go-private");
var chatroom = document.querySelector("#chatroom");
var chatlog = document.querySelector("#chatlog");
var chatInput = document.querySelector("#chat-input");
var encryptButton = document.querySelector("#encrypt-button");
var roster = document.querySelector("#roster");

// Is the chatlog scrolled to the bottom?
var isAtBottom = true;

var username;
var roomname;

var hostname = window.location.host;
if (hostname == "") {
  // Probably testing the HTML locally.
  hostname = "edge-chat-demo.cloudflareworkers.com";
}

function startNameChooser() {
  nameForm.addEventListener("submit", function(event) {
    event.preventDefault();
    username = nameInput.value;
    if (username.length > 0) {
      startRoomChooser();
    }
  });

  nameInput.addEventListener("input", function(event) {
    if (event.currentTarget.value.length > 32) {
      event.currentTarget.value = event.currentTarget.value.slice(0, 32);
    }
  });

  nameInput.focus();
}

function startRoomChooser() {
  if (nameForm && nameForm.parentNode) nameForm.parentNode.removeChild(nameForm);

  if (document.location.hash.length > 1) {
    roomname = document.location.hash.slice(1);
    startChat();
    return;
  }

  roomForm.addEventListener("submit", function(event) {
    event.preventDefault();
    roomname = roomNameInput.value;
    if (roomname.length > 0) {
      startChat();
    }
  });

  roomNameInput.addEventListener("input", function(event) {
    if (event.currentTarget.value.length > 32) {
      event.currentTarget.value = event.currentTarget.value.slice(0, 32);
    }
  });

  goPublicButton.addEventListener("click", function(event) {
    roomname = roomNameInput.value;
    if (roomname.length > 0) {
      startChat();
    }
  });

  goPrivateButton.addEventListener("click", function(event) {
    roomNameInput.disabled = true;
    goPublicButton.disabled = true;
    event.currentTarget.disabled = true;

    fetch("https://" + hostname + "/api/room", {method: "POST"})
      .then(function(response) {
        if (!response.ok) {
          alert("something went wrong");
          document.location.reload();
          return;
        }
        return response.text();
      })
      .then(function(text) {
        if (text) {
          roomname = text;
          startChat();
        }
      })
      .catch(function() {
        alert("something went wrong");
        document.location.reload();
      });
  });

  roomNameInput.focus();
}

function startChat() {
  if (roomForm && roomForm.parentNode) roomForm.parentNode.removeChild(roomForm);

  // Normalize the room name a bit.
  roomname = roomname.replace(/[^a-zA-Z0-9_-]/g, "").replace(/_/g, "-").toLowerCase();

  if (roomname.length > 32 && !roomname.match(/^[0-9a-f]{64}$/)) {
    addChatMessage("ERROR", "Invalid room name.");
    return;
  }

  document.location.hash = "#" + roomname;

  chatInput.addEventListener("keydown", function(event) {
    if (event.keyCode == 38) {
      // up arrow
      chatlog.scrollBy(0, -50);
    } else if (event.keyCode == 40) {
      // down arrow
      chatlog.scrollBy(0, 50);
    } else if (event.keyCode == 33) {
      // page up
      chatlog.scrollBy(0, -chatlog.clientHeight + 50);
    } else if (event.keyCode == 34) {
      // page down
      chatlog.scrollBy(0, chatlog.clientHeight - 50);
    }
  });

  if (encryptButton) {
    encryptButton.addEventListener("click", function(event) {
      event.preventDefault();
      event.stopPropagation();
      showEncryptModal();
    });
  }

  chatroom.addEventListener("submit", function(event) {
    event.preventDefault();

    if (currentWebSocket) {
      currentWebSocket.send(JSON.stringify({message: chatInput.value}));
      chatInput.value = "";

      // Scroll to bottom whenever sending a message.
      chatlog.scrollBy(0, 1e8);
    }
  });

  chatInput.addEventListener("input", function(event) {
    if (event.currentTarget.value.length > 1024) {
      event.currentTarget.value = event.currentTarget.value.slice(0, 1024);
    }
  });

  chatlog.addEventListener("scroll", function(event) {
    isAtBottom = chatlog.scrollTop + chatlog.clientHeight >= chatlog.scrollHeight;
  });

  chatInput.focus();
  document.body.addEventListener("click", function(event) {
    // If the user clicked somewhere in the window without selecting any text, focus the chat
    // input.
    if (window.getSelection().toString() == "") {
      chatInput.focus();
    }
  });

  // Detect mobile keyboard appearing and disappearing, and adjust the scroll as appropriate.
  if('visualViewport' in window) {
    window.visualViewport.addEventListener('resize', function(event) {
      if (isAtBottom) {
        chatlog.scrollBy(0, 1e8);
      }
    });
  }

  join();
}

var passwordDbPromise = null;
function openPasswordDb() {
  if (passwordDbPromise) {
    return passwordDbPromise;
  }
  passwordDbPromise = new Promise(function(resolve, reject) {
    var request = indexedDB.open('chat-passwords', 1);
    request.onupgradeneeded = function(event) {
      var db = event.target.result;
      if (!db.objectStoreNames.contains('passwords')) {
        db.createObjectStore('passwords', {keyPath: 'id'});
      }
    };
    request.onsuccess = function(event) {
      resolve(event.target.result);
    };
    request.onerror = function(event) {
      reject(event.target.error || new Error('IndexedDB open failed'));
    };
  });
  return passwordDbPromise;
}

function savePassword(key, password) {
  return openPasswordDb().then(function(db) {
    var tx = db.transaction('passwords', 'readwrite');
    var store = tx.objectStore('passwords');
    store.put({id: key, value: password});
    return new Promise(function(resolve, reject) {
      tx.oncomplete = function() { resolve(); };
      tx.onerror = function() { reject(tx.error || new Error('IndexedDB save failed')); };
    });
  });
}

function getSavedPassword(key) {
  return openPasswordDb().then(function(db) {
    var tx = db.transaction('passwords', 'readonly');
    var store = tx.objectStore('passwords');
    var request = store.get(key);
    return new Promise(function(resolve, reject) {
      request.onsuccess = function() { resolve(request.result ? request.result.value : ''); };
      request.onerror = function() { reject(request.error || new Error('IndexedDB read failed')); };
    });
  });
}

function utf8Encode(text) {
  return new TextEncoder().encode(text);
}

function utf8Decode(bytes) {
  return new TextDecoder().decode(bytes);
}

function base64Encode(buffer) {
  var bytes = new Uint8Array(buffer);
  var binary = '';
  for (var i = 0; i < bytes.length; i++) {
    binary += String.fromCharCode(bytes[i]);
  }
  return btoa(binary);
}

function base64Decode(base64) {
  var binary = atob(base64);
  var bytes = new Uint8Array(binary.length);
  for (var i = 0; i < binary.length; i++) {
    bytes[i] = binary.charCodeAt(i);
  }
  return bytes;
}

function deriveAesKey(password, salt) {
  return crypto.subtle.importKey(
    'raw',
    utf8Encode(password),
    {name: 'PBKDF2'},
    false,
    ['deriveKey']
  ).then(function(baseKey) {
    return crypto.subtle.deriveKey(
      {
        name: 'PBKDF2',
        salt: salt,
        iterations: 100000,
        hash: 'SHA-256'
      },
      baseKey,
      {name: 'AES-GCM', length: 256},
      false,
      ['encrypt', 'decrypt']
    );
  });
}

function encryptText(message, password) {
  var salt = crypto.getRandomValues(new Uint8Array(16));
  var iv = crypto.getRandomValues(new Uint8Array(12));
  return deriveAesKey(password, salt).then(function(key) {
    return crypto.subtle.encrypt(
      {name: 'AES-GCM', iv: iv},
      key,
      utf8Encode(message)
    ).then(function(ciphertext) {
      var data = new Uint8Array(salt.length + iv.length + ciphertext.byteLength);
      data.set(salt, 0);
      data.set(iv, salt.length);
      data.set(new Uint8Array(ciphertext), salt.length + iv.length);
      return base64Encode(data.buffer);
    });
  });
}

function decryptText(encoded, password) {
  var data = base64Decode(encoded);
  if (data.length < 28) {
    return Promise.reject(new Error('Invalid encrypted message'));
  }
  var salt = data.slice(0, 16);
  var iv = data.slice(16, 28);
  var ciphertext = data.slice(28);
  return deriveAesKey(password, salt).then(function(key) {
    return crypto.subtle.decrypt(
      {name: 'AES-GCM', iv: iv},
      key,
      ciphertext
    );
  }).then(function(plaintext) {
    return utf8Decode(new Uint8Array(plaintext));
  });
}

function showEncryptModal() {
  var overlay = createModalOverlay();
  var modal = createPasswordModal('Encrypt message', overlay);

  var explanation = document.createElement('p');
  explanation.style.marginTop = '0';
  explanation.style.marginBottom = '12px';
  explanation.textContent = 'Enter a password to encrypt the current message.';
  modal.appendChild(explanation);

  var passwordInput = document.createElement('input');
  passwordInput.type = 'password';
  passwordInput.className = 'copy-input';
  passwordInput.placeholder = 'Password';
  modal.appendChild(passwordInput);

  var rememberWrapper = document.createElement('label');
  rememberWrapper.style.display = 'block';
  rememberWrapper.style.marginTop = '8px';
  rememberWrapper.style.color = 'var(--text)';
  var rememberCheckbox = document.createElement('input');
  rememberCheckbox.type = 'checkbox';
  rememberCheckbox.style.marginRight = '8px';
  rememberWrapper.appendChild(rememberCheckbox);
  rememberWrapper.appendChild(document.createTextNode('Remember password'));
  modal.appendChild(rememberWrapper);

  var errorText = document.createElement('div');
  errorText.style.color = '#ff6b6b';
  errorText.style.marginTop = '8px';
  errorText.style.display = 'none';
  modal.appendChild(errorText);

  var buttonRow = createModalButtonRow();
  modal.appendChild(buttonRow);

  var cancelBtn = createModalButton('Cancel');
  cancelBtn.addEventListener('click', function() { closeModal(overlay); });
  buttonRow.appendChild(cancelBtn);

  var sendBtn = createModalButton('Send');
  sendBtn.addEventListener('click', function() {
    var password = passwordInput.value;
    if (!password) {
      errorText.textContent = 'Password cannot be empty.';
      errorText.style.display = 'block';
      passwordInput.focus();
      return;
    }
    var message = chatInput.value;
    if (!message || message.trim().length === 0) {
      errorText.textContent = 'Message cannot be empty.';
      errorText.style.display = 'block';
      chatInput.focus();
      return;
    }
    if (rememberCheckbox.checked) {
      savePassword('encryptPassword', password);
    }
    encryptText(message, password).then(function(encoded) {
      if (currentWebSocket) {
        currentWebSocket.send(JSON.stringify({message: encoded}));
      }
      chatInput.value = '';
      closeModal(overlay);
    }).catch(function(err) {
      errorText.textContent = 'Encryption failed.';
      errorText.style.display = 'block';
    });
  });
  buttonRow.appendChild(sendBtn);

  getSavedPassword('encryptPassword').then(function(saved) {
    if (saved) {
      passwordInput.value = saved;
      rememberCheckbox.checked = true;
    }
  });
}

function showDecryptModal(encodedMessage) {
  var overlay = createModalOverlay();

  var explanation = document.createElement('p');
  explanation.style.marginTop = '0';

  modal.appendChild(explanation);

  var passwordInput = document.createElement('input');

  passwordInput.className = 'copy-input';

  rememberWrapper.style.marginTop = '8px';
  rememberWrapper.style.color = 'var(--text)';
  var rememberCheckbox = document.createElement('input');
  rememberCheckbox.type = 'checkbox';
  rememberCheckbox.style.marginRight = '8px';
  rememberWrapper.appendChild(rememberCheckbox);
  rememberWrapper.appendChild(document.createTextNode('Remember password'));
  modal.appendChild(rememberWrapper);

  var resultBox = document.createElement('textarea');
  resultBox.className = 'copy-input';
  resultBox.style.minHeight = '80px';
  resultBox.style.marginTop = '12px';
  resultBox.style.display = 'none';
  resultBox.readOnly = true;
  modal.appendChild(resultBox);

  var errorText = document.createElement('div');
  errorText.style.color = '#ff6b6b';
  errorText.style.marginTop = '8px';
  errorText.style.display = 'none';
  modal.appendChild(errorText);

  var buttonRow = createModalButtonRow();
  modal.appendChild(buttonRow);

  var cancelBtn = createModalButton('Cancel');
  cancelBtn.addEventListener('click', function() { closeModal(overlay); });
  buttonRow.appendChild(cancelBtn);

  var decryptBtn = createModalButton('Decrypt');
  decryptBtn.addEventListener('click', function() {
    var password = passwordInput.value;
    if (!password) {
      errorText.textContent = 'Password cannot be empty.';
      errorText.style.display = 'block';
      passwordInput.focus();
      return;
    }
    if (rememberCheckbox.checked) {
      savePassword('decryptPassword', password);
    }
    decryptText(encodedMessage, password).then(function(plaintext) {
      resultBox.value = plaintext;
      resultBox.style.display = 'block';
      errorText.style.display = 'none';
      resultBox.focus();
      resultBox.setSelectionRange(0, resultBox.value.length);
    }).catch(function(err) {
      errorText.textContent = 'Decryption failed. Check password or message.';
      errorText.style.display = 'block';
      resultBox.style.display = 'none';
    });
  });
  buttonRow.appendChild(decryptBtn);

  getSavedPassword('decryptPassword').then(function(saved) {
    if (saved) {
      passwordInput.value = saved;
      rememberCheckbox.checked = true;
    }
  });
}

function createModalOverlay() {
  var overlay = document.createElement('div');
  overlay.id = 'password-overlay';
  overlay.addEventListener('click', function() { closeModal(overlay); });
  document.body.appendChild(overlay);
  return overlay;
}

function createPasswordModal(titleText, overlay) {
  var modal = document.createElement('div');
  modal.className = 'copy-modal';
  modal.addEventListener('click', function(e) { e.stopPropagation(); });

  var title = document.createElement('h2');
  title.textContent = titleText;

  var closeBtn = document.createElement('button');

function createModalButton(label) {
  var button = document.createElement('button');
  button.type = 'button';
  button.textContent = label;
  button.style.border = '1px solid var(--border)';
  button.style.background = '#0f1720';

function closeModal(overlay) {
  if (overlay && overlay.parentNode) {
    overlay.parentNode.removeChild(overlay);

function join() {
  // If we are running via wrangler dev, use ws:
  var wss = document.location.protocol === "http:" ? "ws://" : "wss://";
  var ws = new WebSocket(wss + hostname + "/api/room/" + roomname + "/websocket");
  var rejoined = false;
  var startTime = Date.now();

  function rejoin() {
    if (!rejoined) {
      rejoined = true;
      currentWebSocket = null;

      // Clear the roster.
      while (roster.firstChild) {
        roster.removeChild(roster.firstChild);
      }

      // Don't try to reconnect too rapidly.
      var timeSinceLastJoin = Date.now() - startTime;
      if (timeSinceLastJoin < 10000) {
        // Less than 10 seconds elapsed since last join. Pause a bit.
        setTimeout(function() { join(); }, 10000 - timeSinceLastJoin);
      } else {
        // OK, reconnect now!
        join();
      }
    }
  }

  ws.addEventListener("open", function(event) {
    currentWebSocket = ws;

    // Send user info message.
    ws.send(JSON.stringify({name: username}));
  });

  ws.addEventListener("message", function(event) {
    var data = JSON.parse(event.data);

    if (data.error) {
      addChatMessage(null, "* Error: " + data.error);
    } else if (data.joined) {
      var p = document.createElement("p");
      p.innerText = data.joined;
      roster.appendChild(p);
    } else if (data.quit) {
      var i;
      for (i = 0; i < roster.childNodes.length; i++) {
        var child = roster.childNodes[i];
        if (child.innerText == data.quit) {
          roster.removeChild(child);
          break;
        }
      }
    } else if (data.ready) {
      // All pre-join messages have been delivered.
      if (!wroteWelcomeMessages) {
        wroteWelcomeMessages = true;
        // Welcome messages intentionally left commented out in localized build.
        if (roomname.length == 64) {
          addChatMessage(null,
              "* 这是一个一个私人房间，你可以发送这个链接给朋友来邀请他们加入： " + document.location.href);
        } else {
          addChatMessage(null,
              "* 欢迎来到杰哥聊 房间：#" + roomname + ". Say hi!");
        }
      }
    } else {
      // A regular chat message.
      if (data.timestamp > lastSeenTimestamp) {
        addChatMessage(data.name, data.message);
        lastSeenTimestamp = data.timestamp;
      }
    }
  });

  ws.addEventListener("close", function(event) {
    console.log("WebSocket closed, reconnecting:", event.code, event.reason);
    rejoin();
  });
  ws.addEventListener("error", function(event) {
    console.log("WebSocket error, reconnecting:", event);
    rejoin();
  });
}

function addChatMessage(name, text) {
  var p = document.createElement("p");
  if (name) {
    var tag = document.createElement("span");
    tag.className = "username";
    tag.innerText = name + ": ";
    p.appendChild(tag);
  }
  p.appendChild(document.createTextNode(text));

  // Add copy button with hard-coded SVG
  var btn = document.createElement("button");
  btn.type = 'button';
  btn.className = "copy-btn";
  btn.setAttribute("aria-label", "copy message");
  btn.innerHTML = '<svg width="16" height="16" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg" aria-hidden="true"><path fill="currentColor" d="M16 2H8a2 2 0 0 0-2 2v1H6a2 2 0 0 0-2 2v11a2 2 0 0 0 2 2h10a2 2 0 0 0 2-2V7a2 2 0 0 0-2-2h-.0V4a2 2 0 0 0-2-2z"/></svg>';
  btn.addEventListener('click', function(e) {
    e.preventDefault();
    e.stopPropagation();
    showCopyModal(text);
  });

  p.appendChild(btn);

  var decryptBtn = document.createElement("button");
  decryptBtn.type = 'button';
  decryptBtn.className = "decrypt-btn";
  decryptBtn.setAttribute("aria-label", "decrypt message");
  decryptBtn.innerHTML = '<svg width="16" height="16" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg" aria-hidden="true"><path fill="currentColor" d="M17 8V7a5 5 0 0 0-10 0v1H5a2 2 0 0 0-2 2v9a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-9a2 2 0 0 0-2-2h-2zm-8-1a3 3 0 0 1 6 0v1H9V7zm10 12H5v-9h14v9z"/></svg>';
  decryptBtn.addEventListener('click', function(e) {
    e.preventDefault();
    e.stopPropagation();
    showDecryptModal(text);
  });
  p.appendChild(decryptBtn);

  // Append the new chat line, making sure that if the chatlog was scrolled to the bottom
  // before, it remains scrolled to the bottom, and otherwise the scroll position doesn't
  // change.
  chatlog.appendChild(p);
  if (isAtBottom) {
    try { chatlog.scrollBy(0, 1e8); } catch (e) { chatlog.scrollTop = chatlog.scrollHeight; }
  }
}

function showCopyModal(message) {
  // Create overlay
  var overlay = document.createElement('div');
  overlay.id = 'copy-overlay';
  overlay.addEventListener('click', function() { close(); });

  // Modal
  var modal = document.createElement('div');
  modal.className = 'copy-modal';
  modal.addEventListener('click', function(e) { e.stopPropagation(); });

  // Close button
  var closeBtn = document.createElement('button');
  closeBtn.type = 'button';
  closeBtn.className = 'copy-close';
  closeBtn.innerHTML = '✕';
  closeBtn.addEventListener('click', function() { close(); });
  modal.appendChild(closeBtn);

  // Input
  var input = document.createElement('input');
  input.className = 'copy-input';
  input.type = 'text';
  input.value = message;
  input.readOnly = true;
  modal.appendChild(input);

  overlay.appendChild(modal);
  document.body.appendChild(overlay);

  // Focus and select text so user can copy
  setTimeout(function() {
    try {
      input.focus();
      input.setSelectionRange(0, input.value.length);
    } catch (e) {}
  }, 50);

  function close() {
    if (overlay && overlay.parentNode) overlay.parentNode.removeChild(overlay);
  }
}

startNameChooser();
